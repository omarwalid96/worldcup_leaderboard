# fly.toml app configuration file generated for haxball-eznii on 2026-06-19T20:14:10+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'haxball-eznii'
primary_region = 'cdg'

# build context + dockerfile passed on the CLI from repo root (needs ../../src physics)

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpus = 1
  memory_mb = 256
